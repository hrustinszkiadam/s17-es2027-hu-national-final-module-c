name: ssa-main-backend

services:
  db:
    image: mysql:8.0
    container_name: ssa-main-backend-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: toor
    ports:
      - '3306:3306'
    volumes:
      - ./db:/dumps:ro
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-prootpassword']
      interval: 5s
      timeout: 5s
      retries: 20
  pma:
    image: phpmyadmin/phpmyadmin
    container_name: ssa-main-backend-pma
    restart: unless-stopped
    ports:
      - '8080:80'
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: toor
    depends_on:
      db:
        condition: service_healthy

  main-backend:
    image: ghcr.io/skillsit-hu/es2027-s17-hu-r3-module-c-main-backend
    container_name: ssa-main-backend-app
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: mysql://root:toor@db:3306/ssa_main_backend
      API_VERSION: v1
      API_BASE_PATH: /api/v1
      CONTENT_TOKEN_SECRET: 38344ac35d91bfd0c8f43963b0ca188d2a039504e825ff968b0366855bdbca5b
      CONTENT_TOKEN_TTL_SECONDS: 60
    depends_on:
      db:
        condition: service_healthy
